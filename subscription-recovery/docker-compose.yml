services:
  postgres:
    image: postgres:16
    container_name: subscription-recovery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: subscription_recovery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subscription_recovery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
