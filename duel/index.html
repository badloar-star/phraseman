<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PhraseMan — Дуэль</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #1a2e1a; color: #fff; text-align: center; }
    .card { padding: 32px; max-width: 360px; }
    h1 { font-size: 2em; margin-bottom: 8px; }
    p { color: #aaa; margin-bottom: 24px; }
    a.btn { display: inline-block; background: #4CAF50; color: #000; font-weight: 700;
            padding: 14px 32px; border-radius: 12px; text-decoration: none; font-size: 1.1em; }
  </style>
  <script>
    var path = window.location.pathname;
    var roomId = path.split('/').pop();
    if (roomId && roomId !== 'duel' && roomId !== 'index.html') {
      window.location = 'phraseman://duel/' + roomId;
      setTimeout(function() {
        window.location = 'https://play.google.com/store/apps/details?id=app.phraseman';
      }, 1500);
    }
  </script>
</head>
<body>
  <div class="card">
    <h1>⚔️</h1>
    <h1>PhraseMan</h1>
    <p>Тебя вызвали на дуэль по английскому!</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=app.phraseman">
      Скачать приложение
    </a>
  </div>
</body>
</html>
