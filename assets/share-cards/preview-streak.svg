<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f28"/>
      <stop offset="45%" stop-color="#06141b"/>
      <stop offset="100%" stop-color="#020a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#d4a017" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06141b" stop-opacity="0"/>
