const container = document.getElementById('phrases');
phrases.forEach(p => {
  const changed = p.words.some(w => w.ch.length > 0);
  const block = document.createElement('div');
  block.className = 'phrase-block';
  if (changed) block.style.borderColor = '#776000';

  let wordsHtml = `<table class="words-table">
    <tr><th>Слово</th><th>Correct</th><th>Category</th><th>Дистракторы</th></tr>`;
  p.words.forEach(w => {
    const dList = w.d.map(d => {
      const cls = w.ch.includes(d) ? 'd-changed' : 'd-normal';
      return `<span class="${cls}">${d}</span>`;
    }).join(' ');
    wordsHtml += `<tr>
      <td><span class="word-text">${w.t}</span></td>
      <td><span class="correct-tag">${w.c}</span></td>
      <td><span class="category-tag">${w.cat}</span></td>
      <td><div class="distractors-list">${dList}</div></td>
    </tr>`;
  });
  wordsHtml += '</table>';

  block.innerHTML = `
    <div class="phrase-header">
      <div class="phrase-num">${p.n}</div>
      <div class="phrase-en">${p.en}</div>
      <div class="phrase-ru">${p.ru}</div>
      <div class="phrase-uk">/ ${p.uk}</div>
      ${changed ? '<span style="background:#ffd600;color:#000;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:bold;">✎ изменено</span>' : ''}
    </div>
    ${wordsHtml}
    <div class="cards-section">
      <div class="card card-correct"><div class="card-label">✓ Правильно</div>${p.card.cor}</div>
      <div class="card card-wrong"><div class="card-label">✗ Неправильно</div>${p.card.wr}</div>
      <div class="card card-secret"><div class="card-label">★ Секрет</div>${p.card.sec}</div>
    </div>`;
  container.appendChild(block);
});
